<div class="custom-cursor"></div>

<img src="cruzmouseblanca.png" class="mini-cross cross6">

<img src="cruzmouseblanca.png" class="mini-cross cross7">
<img src="cruzmouseblanca.png" class="mini-cross cross8">

</div>

</div>


<!-- INTRO -->

<div id="intro">

<div class="intro-content">

<img src="cruzmouseblanca.png" class="intro-cross" id="introCross">

<div class="intro-logo hidden" id="introLogo">
<span class="intro-s">s</span>aint 555
</div>

</div>
</div>


<header>

<h1 class="logo hidden" id="finalLogo">

<span class="sain">Sain</span>

<img src="cruzmouseblanca.png" class="cross-symbol" id="finalCross">

555

</h1>

</a>

<script>

/* CURSOR */

const cursor = document.querySelector(".custom-cursor");

document.addEventListener("mousemove", e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

document.querySelectorAll("a,button").forEach(el=>{
el.addEventListener("mouseenter",()=>cursor.classList.add("hover"));
el.addEventListener("mouseleave",()=>cursor.classList.remove("hover"));
});


/* INTRO */

const introCross=document.getElementById("introCross");
const introLogo=document.getElementById("introLogo");
const finalCross=document.getElementById("finalCross");
const finalLogo=document.getElementById("finalLogo");

setTimeout(()=>{introLogo.classList.remove("hidden")},1000);
setTimeout(()=>{introLogo.classList.add("hidden")},2200);

setTimeout(()=>{

const target=finalCross.getBoundingClientRect();
const start=introCross.getBoundingClientRect();

const dx=target.left+target.width/2-(start.left+start.width/2);
const dy=target.top+target.height/2-(start.top+start.height/2);

introCross.style.transition="transform 1.6s cubic-bezier(.77,0,.18,1),width 1.6s";
introCross.style.transform=`translate(${dx}px,${dy}px)`;
introCross.style.width="130px";

},2400);

setTimeout(()=>{finalLogo.classList.remove("hidden")},4100);

setTimeout(()=>{
document.getElementById("intro").style.opacity="0";
document.getElementById("intro").style.pointerEvents="none";
},4500);


/* PAGE TRANSITION */

const transition=document.querySelector(".saint-transition");

function goToPage(url){

transition.classList.add("active");

setTimeout(()=>{
window.location.href=url;
},2000);

}

document.querySelector(".btn").addEventListener("click",function(e){

e.preventDefault();

goToPage("shop.html");

});

document.querySelectorAll("a").forEach(link=>{

link.addEventListener("click",function(e){

const href=this.getAttribute("href");

if(href && !href.startsWith("#")){

e.preventDefault();

goToPage(href);

}

});

});

</script>

</body>
</html>
