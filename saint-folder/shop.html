<!DOCTYPE html>
<html lang="es">

</head>

<body class="shop-body">
 <div class="custom-cursor"></div>


<header class="navbar">

  <nav>
    <a href="index.html" class="shop-link-black">Home</a>
    <a href="shop.html" class="active shop-link-black">Shop</a>
  </nav>
</header>

<section class="shop-hero">
  <h1 class="titulo2">
    THE SAIN<span class="shop-cross-container">
      <img src="cruzmouseblanca.png" class="cross-symbol shop-cross" id="shopCross">

</section>

<section class="products">

  <div class="product-card">

  </div>

  <div class="product-card">

<footer class="main-footer">

    </a>
  </div>
</footer>
<script>
const cursor = document.querySelector(".custom-cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* efecto hover ultra clean */
const hoverElements = document.querySelectorAll("a, button");

hoverElements.forEach(el => {
  el.addEventListener("mouseenter", () => {
    cursor.classList.add("hover");
  });
  el.addEventListener("mouseleave", () => {
    cursor.classList.remove("hover");
  });
});
</script>
</body>
